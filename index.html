<!doctype html>
<html lang="fr">
  <head>

    <meta name="theme-color" content="#2f5d50" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- SEO -->
    <title>Ami Secret — Échange de cadeaux anonyme entre amis, en famille ou au travail</title>
    <meta

      content="Organise ton échange de cadeaux anonyme en 2 minutes : tirage au sort secret, listes de souhaits, messages anonymes, photos et rappels. Gratuit, en français, entre amis, en famille, au bureau ou à l'école."
    />

      name="keywords"
      content="ami secret, échange de cadeaux, tirage au sort cadeaux, secret santa, pige de noël, cadeau anonyme, organisateur échange cadeaux, jeu de cadeaux groupe"

    <meta name="author" content="Ami Secret" />

    <!-- Open Graph (Facebook, Messenger, LinkedIn…) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ami Secret" />
    <meta property="og:url" content="https://amisecret.xyz/" />
    <meta property="og:title" content="Ami Secret — Échange de cadeaux anonyme, sans casse-tête" />

      property="og:description"
      content="Tirage secret, listes de souhaits, messages anonymes, photos et rappels : tout pour un échange de cadeaux mémorable. Gratuit et en français."
    />
    <meta property="og:image" content="https://amisecret.xyz/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ami Secret — l'app d'échange de cadeaux anonyme" />

    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:description"
      content="Tirage secret, listes de souhaits, messages anonymes, photos et rappels : tout pour un échange de cadeaux mémorable. Gratuit et en français."
    />
    <meta name="twitter:image" content="https://amisecret.xyz/og-image.png" />

    <!-- Données structurées pour les moteurs de recherche -->
